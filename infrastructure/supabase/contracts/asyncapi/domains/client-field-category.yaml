components:
  messages:
    ClientFieldCategoryCreated:
      name: client_field_category.created
      title: Client Field Category Created
      summary: An org-defined field category has been created for grouping field definitions
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ClientFieldCategoryCreatedEvent'

    ClientFieldCategoryUpdated:
      name: client_field_category.updated
      title: Client Field Category Updated
      summary: An org-defined field category has been renamed or reordered
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ClientFieldCategoryUpdatedEvent'

    ClientFieldCategoryDeactivated:
      name: client_field_category.deactivated
      title: Client Field Category Deactivated
      summary: An org-defined field category has been deactivated (soft-delete, reversible via reactivation)
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ClientFieldCategoryDeactivatedEvent'

    ClientFieldCategoryReactivated:
      name: client_field_category.reactivated
      title: Client Field Category Reactivated
      summary: A previously deactivated org-defined field category has been reactivated (does not cascade to children)
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ClientFieldCategoryReactivatedEvent'

    ClientFieldCategoryDeleted:
      name: client_field_category.deleted
      title: Client Field Category Deleted
      summary: An org-defined field category has been permanently deleted (hard delete, only after deactivation with no remaining child fields)
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ClientFieldCategoryDeletedEvent'

  schemas:
    # =========================================================================
    # Event Envelope Schemas
    # =========================================================================

    ClientFieldCategoryCreatedEvent:
      title: ClientFieldCategoryCreatedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
          description: Field category UUID
        stream_type:
          type: string
          const: client_field_category
        event_type:
          type: string
          const: client_field_category.created
        event_data:
          $ref: '#/components/schemas/ClientFieldCategoryCreatedData'
        event_metadata:
          $ref: '../components/schemas.yaml#/components/schemas/EventMetadata'

    ClientFieldCategoryUpdatedEvent:
      title: ClientFieldCategoryUpdatedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
          description: Field category UUID
        stream_type:
          type: string
          const: client_field_category
        event_type:
          type: string
          const: client_field_category.updated
        event_data:
          $ref: '#/components/schemas/ClientFieldCategoryUpdatedData'
        event_metadata:
          $ref: '../components/schemas.yaml#/components/schemas/EventMetadata'

    ClientFieldCategoryDeactivatedEvent:
      title: ClientFieldCategoryDeactivatedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
          description: Field category UUID
        stream_type:
          type: string
          const: client_field_category
        event_type:
          type: string
          const: client_field_category.deactivated
        event_data:
          $ref: '#/components/schemas/ClientFieldCategoryDeactivatedData'
        event_metadata:
          $ref: '../components/schemas.yaml#/components/schemas/EventMetadata'

    # =========================================================================
    # Data Schemas
    # =========================================================================

    ClientFieldCategoryCreatedData:
      title: ClientFieldCategoryCreatedData
      type: object
      description: Data for org-defined field category creation
      required:
        - category_id
        - organization_id
        - name
        - slug
      properties:
        category_id:
          type: string
          format: uuid
          description: Unique ID for the category
        organization_id:
          type: string
          format: uuid
          description: Organization this category belongs to
        name:
          type: string
          description: Display name for the category
          examples:
            - "Program-Specific"
            - "Behavioral"
        slug:
          type: string
          description: URL-safe identifier, unique per org
          examples:
            - "program_specific"
            - "behavioral"
        sort_order:
          type: integer
          default: 0

    ClientFieldCategoryUpdatedData:
      title: ClientFieldCategoryUpdatedData
      type: object
      description: Data for field category rename or reorder
      required:
        - category_id
        - organization_id
      properties:
        category_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
          description: Updated display name (if changed)
          examples:
            - "Behavioral Health"
        sort_order:
          type: integer
          description: Updated sort order (if changed)

    ClientFieldCategoryDeactivatedData:
      title: ClientFieldCategoryDeactivatedData
      type: object
      description: Data for field category deactivation
      required:
        - category_id
        - organization_id
      properties:
        category_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid

    ClientFieldCategoryReactivatedEvent:
      title: ClientFieldCategoryReactivatedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
          description: Field category UUID
        stream_type:
          type: string
          const: client_field_category
        event_type:
          type: string
          const: client_field_category.reactivated
        event_data:
          $ref: '#/components/schemas/ClientFieldCategoryReactivatedData'
        event_metadata:
          $ref: '../components/schemas.yaml#/components/schemas/EventMetadata'

    ClientFieldCategoryReactivatedData:
      title: ClientFieldCategoryReactivatedData
      type: object
      description: Data for field category reactivation. Does not cascade to child fields — they remain in their current state.
      required:
        - category_id
        - organization_id
      properties:
        category_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid

    ClientFieldCategoryDeletedEvent:
      title: ClientFieldCategoryDeletedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
          description: Field category UUID (projection row deleted after handler runs)
        stream_type:
          type: string
          const: client_field_category
        event_type:
          type: string
          const: client_field_category.deleted
        event_data:
          $ref: '#/components/schemas/ClientFieldCategoryDeletedData'
        event_metadata:
          $ref: '../components/schemas.yaml#/components/schemas/EventMetadata'

    ClientFieldCategoryDeletedData:
      title: ClientFieldCategoryDeletedData
      type: object
      description: Data for permanent field category deletion
      required:
        - category_id
        - organization_id
      properties:
        category_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
