        organization_id:
          type: string
          format: uuid
        phone_id:
          type: string
          format: uuid
          description: Sub-entity UUID
        phone_number:
          type: string
        phone_type:
          type: string
          default: mobile
          description: Phone type (mobile, home, work, fax)
        is_primary:
          type: boolean
          default: false

    ClientPhoneUpdatedEvent:
      title: ClientPhoneUpdatedEvent
      type: object
