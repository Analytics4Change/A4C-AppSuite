    # =========================================================================

    ClientAddressAddedEvent:
      title: ClientAddressAddedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
