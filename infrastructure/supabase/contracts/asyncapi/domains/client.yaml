        email_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_type:
          type: string
        is_primary:
          type: boolean

    ClientEmailRemovedEvent:
      title: ClientEmailRemovedEvent
      type: object
      required:
        - stream_id
        - stream_type
        - event_type
        - event_data
        - event_metadata
      properties:
        stream_id:
          type: string
          format: uuid
        stream_type:
          type: string
          const: client
        event_type:
          type: string
          const: client.email.removed
        event_data:
          $ref: '#/components/schemas/ClientSubEntityRemovalData'
        event_metadata:
          $ref: '../components/schemas.yaml#/components/schemas/EventMetadata'

    # =========================================================================
