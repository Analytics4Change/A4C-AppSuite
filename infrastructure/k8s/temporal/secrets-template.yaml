# Temporal Secrets Template
# Copy this file to secrets.yaml and fill in actual values.
# secrets.yaml is gitignored — never commit real secret values.

apiVersion: v1
kind: Secret
metadata:
  name: temporal-credentials
  namespace: temporal
type: Opaque
stringData:
  # Cloudflare API credentials
  CLOUDFLARE_API_TOKEN: "REPLACE_WITH_ACTUAL_TOKEN"
  CLOUDFLARE_ZONE_ID: "REPLACE_WITH_ACTUAL_ZONE_ID"

  # Supabase connection
  SUPABASE_URL: "REPLACE_WITH_SUPABASE_URL"
  SUPABASE_SERVICE_ROLE_KEY: "REPLACE_WITH_SERVICE_ROLE_KEY"
