name: RPC Shape Registry Sync

# Asserts that frontend/src/services/api/rpc-registry.generated.ts is in sync
# with the database state produced by applying the migration directory to a
# clean local Supabase container. Two failure modes:
#
#   1. UncategorizedRpcs is non-empty — a migration added/changed an api.* RPC
#      without the `@a4c-rpc-shape:` tag in `COMMENT ON FUNCTION`.
#   2. The committed registry file diverges from the generated output —
#      a migration changed the api.* surface but the developer didn't run
#      `npm run gen:rpc-registry`.
#
# Both fail closed and tell the developer what to do. The generator script
# at frontend/scripts/gen-rpc-registry.cjs is idempotent.
#
# CI anchor: a fresh `supabase start` container seeded from the migrations
# directory. Deterministic by design (does NOT consult a remote/dev DB).
# See architect review NT-4 for the rationale.

on:
  pull_request:
    paths:
      - 'infrastructure/supabase/supabase/migrations/**'
      - 'frontend/src/services/api/rpc-registry.generated.ts'
      - 'frontend/scripts/gen-rpc-registry.cjs'
      - '.github/workflows/rpc-registry-sync.yml'

jobs:
  registry-sync:
    name: Verify rpc-registry.generated.ts matches migration state
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase container
        working-directory: infrastructure/supabase
        run: |
          supabase start
          # Wait for the container to be fully ready (status reports DB URL)
          supabase status

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      # Migrations applied in three phases with a permissions seed step in
      # between. Rationale:
      #
      # 20260506190626_add_role_management_view_ou_implications.sql ends with a
      # DO $$ ... ASSERT $$ postcondition that requires 6 implication rows to
      # exist, which depends on permissions_projection being populated. On
      # dev/prod, permissions were populated via the post-baseline seed file
      # `infrastructure/supabase/sql/99-seeds/001-permissions-seed.sql` (it
      # emits permission.defined events that the trigger projects into the
      # projection). On a fresh CI container, that seed never runs (the CLI's
      # supabase/seed.sql doesn't exist; the 99-seeds/*.sql files aren't
      # auto-applied).
      #
      # The prior `supabase db reset --local` step blindly ran every migration
      # in lexical order and failed at 20260506190626 with
      # "Postcondition violated: expected 6 implication rows, found 0".
      #
      # Replacement: drive migrations manually via psql, applying baseline +
      # early migrations first, seeding permissions, then applying remaining
      # migrations.
      - name: Apply migrations and seed permissions in phased order
        working-directory: infrastructure/supabase
        env:
          PGPASSWORD: postgres
        run: |
          PSQL_CMD="psql -h 127.0.0.1 -p 54322 -U postgres -d postgres -v ON_ERROR_STOP=1"

          # Boundary timestamp: apply migrations through and INCLUDING this one
          # before seeding. The postcondition migration 20260506190626 must run
          # AFTER the seed.
          BOUNDARY_TS="20260506012315"

          echo "::group::Phase 1 - Migrations through and including ${BOUNDARY_TS}"
          for f in $(ls supabase/migrations/*.sql | sort); do
            base=$(basename "$f")
            ts=${base%%_*}
            if [[ "$ts" > "$BOUNDARY_TS" ]]; then
              echo "Stopping at $base (will apply after seed)"
              break
            fi
            echo "Applying $base"
            ${PSQL_CMD} -f "$f"
          done
          echo "::endgroup::"

          echo "::group::Phase 2 - Seed permissions (mirrors dev/prod post-baseline state)"
          ${PSQL_CMD} -f sql/99-seeds/001-permissions-seed.sql
          echo "::endgroup::"

          echo "::group::Phase 3 - Apply remaining migrations after ${BOUNDARY_TS}"
          for f in $(ls supabase/migrations/*.sql | sort); do
            base=$(basename "$f")
            ts=${base%%_*}
            if [[ "$ts" > "$BOUNDARY_TS" ]]; then
              echo "Applying $base"
              ${PSQL_CMD} -f "$f"
            fi
          done
          echo "::endgroup::"

          echo "::group::Phase 4 - Record applied migrations in supabase_migrations.schema_migrations"
          # supabase db reset normally writes each migration's version into
          # supabase_migrations.schema_migrations after applying it. We applied
          # via psql, so we record them manually for consistency. The registry
          # generator doesn't actually consult this table, but keeping it
          # consistent prevents confusion in any subsequent step that might.
          for f in $(ls supabase/migrations/*.sql | sort); do
            base=$(basename "$f")
            ts=${base%%_*}
            ${PSQL_CMD} -c "INSERT INTO supabase_migrations.schema_migrations (version, name) VALUES ('${ts}', '${base%.sql}') ON CONFLICT DO NOTHING;" 2>/dev/null || true
          done
          echo "::endgroup::"

      - name: Regenerate registry against local container
        working-directory: frontend
        env:
          # Local container default connection string (no auth-management overhead)
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          npm ci --no-audit --no-fund
          npm run gen:rpc-registry

      - name: Assert no diff in registry file
        run: |
          if ! git diff --exit-code frontend/src/services/api/rpc-registry.generated.ts; then
            echo "::error::rpc-registry.generated.ts is out of sync with the migration state."
            echo "::error::Run \`npm run gen:rpc-registry\` locally and commit the result."
            echo "::error::See documentation/architecture/decisions/adr-rpc-readback-pattern.md §'Type-level enforcement (M3)'."
            exit 1
          fi
          echo "OK: rpc-registry.generated.ts matches migration state"

      - name: Assert no untagged RPCs (UncategorizedRpcs === never)
        run: |
          if ! grep -qE '^export type UncategorizedRpcs = never;\s*$' \
              frontend/src/services/api/rpc-registry.generated.ts; then
            echo "::error::UncategorizedRpcs is not 'never'. One or more api.* RPCs are missing"
            echo "::error::their @a4c-rpc-shape: envelope|read tag in COMMENT ON FUNCTION."
            echo "::error::Add the tag to your migration. See infrastructure-guidelines/SKILL.md."
            grep -A2 'export type UncategorizedRpcs' frontend/src/services/api/rpc-registry.generated.ts || true
            exit 1
          fi
          echo "OK: zero untagged api.* RPCs"

      - name: Tear down container
        if: always()
        working-directory: infrastructure/supabase
        run: supabase stop --no-backup || true
